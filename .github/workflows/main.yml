name: Mise à jour KlassDirect

on:
  schedule:
    - cron: '0 23 * * 5,6'
    - cron: '0 10 * * 1,2,3,4,5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Autorise l'action à modifier les fichiers de ton dépôt
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run Robot
        env:
          ED_IDENTIFIANT: ${{ secrets.ED_IDENTIFIANT }}
          MOT_DE_PASSE: ${{ secrets.MOT_DE_PASSE }}
          ED_REPONSES: ${{ secrets.ED_REPONSES }}
        run: node mon_edt.js

      - name: Sauvegarder data_edt.json sur GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data_edt.json
          git commit -m "Mise à jour automatique de l'EDT [skip ci]" || echo "Aucun changement à enregistrer"
          git push
