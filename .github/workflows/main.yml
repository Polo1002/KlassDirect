name: Mise à jour KlassDirect

on:
  schedule:
    - cron: '0 6 * * *' # Se lance tous les matins à 6h
  workflow_dispatch:     # Permet de le lancer manuellement

jobs:
  build:
    runs-on: ubuntu-latest # C'est ICI que tu l'ajoutes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Version à jour

      - name: Install Node.js
        uses: actions/setup-node@v4 # Version à jour
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Robot
        env:
          ED_IDENTIFIANT: ${{ secrets.ED_IDENTIFIANT }}
          MOT_DE_PASSE: ${{ secrets.MOT_DE_PASSE }}
          ED_REPONSES: ${{ secrets.ED_REPONSES }}
        run: node mon_edt.js
      - name: Save data (Success or Failure)
        if: always() # IMPORTANT : s'exécute même si le script node a crashé
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: Site/
      - name: Upload Screenshots
        if: always() # Obligatoire pour avoir les photos même si ça plante
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-debug
          path: Site/*.png
      - name: Récupérer les captures d'écran
        if: always() # S'exécute même si le script a planté
        uses: actions/upload-artifact@v4
        with:
          name: debug-images
          path: Site/*.png
      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-ecole-directe
          path: Site/*.png
      - name: Recuperer les captures
        if: always() # Obligatoire pour avoir les photos même en cas d'erreur
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-debug
          path: Site/*.png
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: Site/
