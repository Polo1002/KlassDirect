name: Mise à jour KlassDirect

on:
  schedule:
    - cron: '0 6 * * *' # Se lance tous les matins à 6h
  workflow_dispatch:     # Permet de le lancer manuellement

jobs:
  build:
    runs-on: ubuntu-latest # C'est ICI que tu l'ajoutes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Version à jour

      - name: Install Node.js
        uses: actions/setup-node@v4 # Version à jour
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Robot
        env:
          ED_IDENTIFIANT: ${{ secrets.ED_IDENTIFIANT }}
          ED_MOTDEPASSE: ${{ secrets.ED_MOTDEPASSE }}
          ED_REPONSES: ${{ secrets.ED_REPONSES }}
        run: node mon_edt.js

      - name: Save data
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add Site/data_edt.json
          git commit -m "Automated update: data_edt.json" || exit 0
          git push
