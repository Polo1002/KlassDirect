<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlassDirect - Emploi du temps</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* --- VARIABLES & THÈMES --- */
        :root {
            /* Light Theme */
            --bg-gradient-1: #e0c3fc;
            --bg-gradient-2: #8ec5fc;
            --surface: rgba(255, 255, 255, 0.75);
            --surface-hover: rgba(255, 255, 255, 0.9);
            --surface-card: rgba(255, 255, 255, 0.95);
            --border: rgba(255, 255, 255, 0.5);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        .dark {
            /* Dark Theme */
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #1e1b4b;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-hover: rgba(30, 41, 59, 0.9);
            --surface-card: rgba(15, 23, 42, 0.95);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #818cf8;
            --accent-glow: rgba(129, 140, 248, 0.3);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --nav-bg: rgba(15, 23, 42, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            background-attachment: fixed;
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        /* --- LAYOUT --- */
        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* --- HEADER --- */
        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            background: var(--accent);
            color: white;
            padding: 0.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* --- CALENDRIER HORIZONTAL --- */
        .calendar-wrapper {
            margin-bottom: 2rem;
            overflow-x: auto;
            padding: 0.5rem;
            display: flex;
            gap: 0.75rem;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .calendar-wrapper::-webkit-scrollbar {
            display: none;
        }

        .date-card {
            min-width: 65px;
            padding: 1rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .date-card.active {
            background: var(--accent);
            color: white;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        .date-card .day-name {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.8;
            margin-bottom: 0.25rem;
        }

        .date-card .day-number {
            font-size: 1.25rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
        }

        /* --- LISTE DES COURS --- */
        .course-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .course-card {
            padding: 1.25rem;
            display: grid;
            grid-template-columns: 80px 1fr auto;
            align-items: center;
            gap: 1.25rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .course-card:hover {
            background: var(--surface-hover);
            transform: scale(1.02);
        }

        .course-time {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .course-time .end {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 0.8rem;
        }

        .course-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .course-name {
            font-weight: 700;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
        }

        .course-details {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .course-accent {
            width: 6px;
            height: 40px;
            border-radius: 3px;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 400px;
            height: 65px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 1rem;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.5rem;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item i {
            width: 24px;
            height: 24px;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            position: relative;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* --- ÉTATS --- */
        #loading-state, #no-data {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .course-annule {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .badge-annule {
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none !important;
            display: inline-block;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="loading-state">
        <div class="glass-card" style="padding: 1.5rem;">Chargement de l'emploi du temps...</div>
    </div>
    <div id="no-data">
        <div class="glass-card" style="padding: 2rem; max-width: 400px;">
            <i data-lucide="calendar-x" style="width: 48px; height: 48px; margin-bottom: 1rem; color: #ef4444;"></i>
            <h2 style="font-size: 1.2rem; margin-bottom: 0.5rem;">Aucune donnée disponible</h2>
            <p style="font-size: 0.9rem; color: var(--text-secondary);">Le fichier data_edt.json est introuvable ou vide.</p>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo-icon">
                    <i data-lucide="calendar"></i>
                </div>
                <h1 class="font-outfit" style="font-size: 1.5rem; letter-spacing: -0.5px;">KlassDirect</h1>
            </div>
            <p id="current-month" style="color: var(--text-secondary); font-weight: 500; text-transform: capitalize;"></p>
        </header>

        <div class="calendar-wrapper" id="calendar">
            </div>

        <div class="course-list" id="course-list">
            </div>
    </div>

    <nav>
        <a href="#" class="nav-item active">
            <i data-lucide="layout-grid"></i>
            <span>EDT</span>
        </a>
        <a href="#" class="nav-item">
            <i data-lucide="book-open"></i>
            <span>Devoirs</span>
        </a>
        <a href="#" class="nav-item">
            <i data-lucide="message-square"></i>
            <span>Messages</span>
        </a>
        <button onclick="toggleTheme()" class="nav-item" style="background: none; border: none; cursor: pointer;">
            <i data-lucide="moon" id="theme-icon"></i>
            <span>Thème</span>
        </button>
    </nav>

    <div class="modal-overlay" id="course-modal" onclick="closeCourseModal(event)">
        <div class="modal-content glass-card">
            <div id="modal-color-bar" style="height: 8px; width: 60px; border-radius: 4px; margin-bottom: 1.5rem;"></div>
            <h2 id="modal-name" class="font-outfit" style="font-size: 1.75rem; margin-bottom: 0.5rem;"></h2>
            <div id="modal-status-container" style="margin-bottom: 1rem; display: none;">
                <span class="badge-annule">Cours annulé</span>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
                <div class="detail-item" style="font-size: 1.1rem;">
                    <i data-lucide="clock" style="color: var(--accent);"></i>
                    <span id="modal-time"></span>
                </div>
                <div class="detail-item" style="font-size: 1.1rem;">
                    <i data-lucide="user" style="color: var(--accent);"></i>
                    <span id="modal-prof"></span>
                </div>
                <div class="detail-item" style="font-size: 1.1rem;" id="modal-room-container">
                    <i data-lucide="map-pin" style="color: var(--accent);"></i>
                    <span id="modal-room"></span>
                </div>
            </div>
            <button onclick="closeCourseModal()" class="glass-card" style="margin-top: 2rem; width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; font-weight: 700; cursor: pointer;">
                Fermer
            </button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION & VARIABLES ---
        let allCourses = [];
        let selectedDate = new Date();
        const daysShort = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
        const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];

        // --- 2. THÈME ---
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.documentElement.classList.toggle('light', !isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        // --- 3. LOGIQUE CALENDRIER ---
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            const monthEl = document.getElementById('current-month');
            calendarEl.innerHTML = '';
            
            monthEl.textContent = `${months[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`;

            // On génère 14 jours (semaine actuelle + suivante)
            const today = new Date();
            const startDay = new Date(today);
            startDay.setDate(today.getDate() - today.getDay() + 1); // Commencer lundi

            for (let i = 0; i < 14; i++) {
                const date = new Date(startDay);
                date.setDate(startDay.getDate() + i);
                
                const card = document.createElement('div');
                card.className = `date-card glass-card ${isSameDay(date, selectedDate) ? 'active' : ''}`;
                
                card.innerHTML = `
                    <span class="day-name">${daysShort[date.getDay()]}</span>
                    <span class="day-number">${date.getDate()}</span>
                `;
                
                card.onclick = () => {
                    selectedDate = date;
                    initCalendar();
                    render();
                };
                
                calendarEl.appendChild(card);
            }
        }

        function isSameDay(d1, d2) {
            return d1.getDate() === d2.getDate() &&
                   d1.getMonth() === d2.getMonth() &&
                   d1.getFullYear() === d2.getFullYear();
        }

        // --- 4. RÉCUPÉRATION DES DONNÉES ---
        async function loadData(isSilent = false) {
            const loadingEl = document.getElementById('loading-state');
            const noDataEl = document.getElementById('no-data');

            if (!isSilent && loadingEl) loadingEl.style.display = 'flex';
            if (noDataEl) noDataEl.style.display = 'none';

            try {
                // Utilisation d'un chemin relatif robuste
                const response = await fetch('./data_edt.json');
                if (!response.ok) throw new Error('Fichier introuvable');
                
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    if (noDataEl) noDataEl.style.display = 'flex';
                    return;
                }

                allCourses = data;
                render();
            } catch (error) {
                console.error("Erreur de chargement:", error);
                if (noDataEl) noDataEl.style.display = 'flex';
            } finally {
                if (!isSilent && loadingEl) loadingEl.style.display = 'none';
            }
        }

        // --- 5. RENDU DES COURS ---
        function render() {
            const listEl = document.getElementById('course-list');
            listEl.innerHTML = '';

            const dayStr = daysShort[selectedDate.getDay()];
            const dateStr = `${selectedDate.getDate()} ${months[selectedDate.getMonth()].substring(0, 3)}`;
            const fullMatchStr = `${dayStr} ${dateStr}`;

            const dailyCourses = allCourses.filter(c => c.jour.includes(fullMatchStr));

            if (dailyCourses.length === 0) {
                listEl.innerHTML = `
                    <div class="glass-card" style="padding: 2rem; text-align: center; color: var(--text-secondary);">
                        Pas de cours prévu pour ce jour.
                    </div>
                `;
                return;
            }

            // Tri par heure
            dailyCourses.sort((a, b) => a.debut.localeCompare(b.debut));

            dailyCourses.forEach(course => {
                const card = document.createElement('div');
                card.className = 'course-card glass-card';
                card.onclick = () => openCourseModal(course);

                card.innerHTML = `
                    <div class="course-time">
                        <span>${course.debut || '--:--'}</span>
                        <span class="end">${course.fin || '--:--'}</span>
                    </div>
                    <div class="course-accent" style="background: ${course.couleur || 'var(--accent)'}"></div>
                    <div class="course-info">
                        <div class="course-name ${course.annule ? 'course-annule' : ''}">
                            ${course.matiere}
                            ${course.annule ? '<span class="badge-annule" style="margin-left:5px">Annulé</span>' : ''}
                        </div>
                        <div class="course-details">
                            <div class="detail-item">
                                <i data-lucide="map-pin" style="width:14px"></i>
                                <span>${course.salle || 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <i data-lucide="user" style="width:14px"></i>
                                <span>${course.prof || 'Inconnu'}</span>
                            </div>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" style="color: var(--text-secondary)"></i>
                `;
                listEl.appendChild(card);
            });

            lucide.createIcons();
        }

        // --- 6. MODAL ---
        function openCourseModal(course) {
            document.getElementById('modal-name').textContent = course.matiere;
            document.getElementById('modal-time').textContent = `${course.debut} - ${course.fin}`;
            document.getElementById('modal-prof').textContent = course.prof || 'Enseignant non spécifié';
            document.getElementById('modal-room').textContent = course.salle || 'Salle non spécifiée';
            document.getElementById('modal-color-bar').style.background = course.couleur || 'var(--accent)';
            document.getElementById('modal-status-container').style.display = course.annule ? 'block' : 'none';
            
            document.getElementById('course-modal').classList.add('active');
            lucide.createIcons();
        }

        function closeCourseModal(event) {
            if (event && event.target !== document.getElementById('course-modal')) return;
            document.getElementById('course-modal').classList.remove('active');
        }

        // --- 7. DÉMARRAGE ---
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
        }

        initCalendar();
        loadData();
        updateThemeIcon();

        // Actualisation auto discrète
        setInterval(() => loadData(true), 15000);

    </script>
</body>
</html>
